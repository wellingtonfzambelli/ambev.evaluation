name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Ambev.DeveloperEvaluation.sln

      - name: Build
        run: dotnet build Ambev.DeveloperEvaluation.sln -c Release --no-restore

      - name: Test
        run: dotnet test Ambev.DeveloperEvaluation.sln -c Release --no-build --verbosity normal
