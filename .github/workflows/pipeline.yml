name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install reportgenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Restore
        run: dotnet restore ambev/Ambev.DeveloperEvaluation.sln

      - name: Build
        run: dotnet build ambev/Ambev.DeveloperEvaluation.sln -c Release --no-restore

      - name: Test
        run: dotnet test ambev/Ambev.DeveloperEvaluation.sln -c Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ambev/TestResults

      - name: Coverage report
        run: reportgenerator -reports:"ambev/TestResults/**/coverage.cobertura.xml" -targetdir:"ambev/TestResults/CoverageReport" -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ambev/TestResults/CoverageReport
