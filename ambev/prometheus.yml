global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["ambev.developerevaluation.prometheus:9090"]
  - job_name: webapi
    metrics_path: /metrics
    static_configs:
      - targets: ["ambev.developerevaluation.webapi:8080"]
  - job_name: postgres
    static_configs:
      - targets: ["ambev.developerevaluation.postgres_exporter:9187"]
  - job_name: rabbitmq
    static_configs:
      - targets: ["ambev.developerevaluation.rabbitmq_exporter:9419"]
