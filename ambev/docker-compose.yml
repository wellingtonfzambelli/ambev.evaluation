version: '3.8'

services:
  ambev.developerevaluation.webapi:
    container_name: ambev_developer_evaluation_webapi
    image: ${DOCKER_REGISTRY-}ambevdeveloperevaluationwebapi
    build:
      context: .
      dockerfile: src/Ambev.DeveloperEvaluation.WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - Serilog__WriteTo__0__Args__serverUrl=http://ambev.developerevaluation.seq:80
      - Seq__Url=http://ambev.developerevaluation.seq/health
      - Redis__Configuration=ambev.developerevaluation.cache:6379
      - RabbitMq__HostName=ambev.developerevaluation.rabbitmq
      - RabbitMq__UserName=developer
      - RabbitMq__Password=ev@luAt10n
      - Mongo__ConnectionString=mongodb://developer:ev@luAt10n@ambev.developerevaluation.nosql:27017/?authSource=admin
    ports:
      - "8080"
      - "8081"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro

  ambev.developerevaluation.database:
    container_name: ambev_developer_evaluation_database
    image: postgres:13

    environment:
      POSTGRES_DB: developer_evaluation
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: ev@luAt10n
    ports:
      - "5432:5432"
    restart: unless-stopped

  ambev.developerevaluation.nosql:
    container_name: ambev_developer_evaluation_nosql 
    image: mongo:8.0    
    environment:
        MONGO_INITDB_ROOT_USERNAME: developer
        MONGO_INITDB_ROOT_PASSWORD: ev@luAt10n
    ports:
      - "27017"

  ambev.developerevaluation.cache:
    container_name: ambev_developer_evaluation_cache 
    image: redis/redis-stack:latest
    volumes:
      - ./redis.acl:/usr/local/etc/redis/redis.acl:ro
    environment:
      - REDIS_ARGS=--requirepass ev@luAt10n --aclfile /usr/local/etc/redis/redis.acl
    ports:
      - "6379:6379"
      - "8001:8001"

  ambev.developerevaluation.seq:
    container_name: ambev_developer_evaluation_seq
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=admin123
    ports:
      - "5341:80"

  ambev.developerevaluation.rabbitmq:
    container_name: ambev_developer_evaluation_rabbitmq
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=developer
      - RABBITMQ_DEFAULT_PASS=ev@luAt10n
    ports:
      - "5672:5672"
      - "15672:15672"